name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Node 24 自带的 npm 在本项目 lockfile 上会挂起，固定到已验证的版本
      - name: Use stable npm
        run: npm install -g npm@11.12.1

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Check (size + types + tests + build)
        run: npm run check
