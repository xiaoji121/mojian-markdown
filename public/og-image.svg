<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">墨笺 Markdown</title>
  <desc id="desc">A preview card for the Mojian Markdown reading and annotation editor.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#211b15"/>
      <stop offset="1" stop-color="#14110d"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4ebd9"/>
      <stop offset="1" stop-color="#d8c6a7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#14110d"/>
  <rect x="64" y="58" width="1072" height="514" rx="28" fill="url(#panel)" stroke="#4b3c2a" stroke-width="2"/>
  <rect x="104" y="96" width="232" height="438" rx="16" fill="#161310" stroke="#322a22"/>
